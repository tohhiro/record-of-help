version: 2
updates:
  # npm dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Tokyo'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
      - 'npm'
    ignore:
      # メジャーアップデートは手動で対応
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Tokyo'
    labels:
      - 'dependencies'
      - 'github-actions'
    ignore:
      # メジャーアップデートは手動で対応
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
